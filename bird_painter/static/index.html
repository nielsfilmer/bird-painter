<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>bird-painter</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  :root {
    --ink: #4a3f2e;
    --ink-dim: #8d8065;
  }
  html, body { height: 100%; }
  body {
    /* The paper the collage lives on — same aged-cream world as the
       paintings, with soft mottling so it reads as one sheet. */
    background:
      radial-gradient(ellipse at 22% 18%, rgba(122, 96, 59, 0.10), transparent 55%),
      radial-gradient(ellipse at 78% 76%, rgba(122, 96, 59, 0.12), transparent 50%),
      radial-gradient(ellipse at 65% 25%, rgba(255, 252, 240, 0.55), transparent 60%),
      radial-gradient(ellipse at 50% 50%, #f4edda 0%, #ece1c6 62%, #ddcda6 100%);
    color: var(--ink);
    font-family: Georgia, "Times New Roman", serif;
    overflow: hidden;
  }
  /* Grain overlay: subtle paper tooth over everything, plates included. */
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.5;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/><feColorMatrix values='0 0 0 0 0.42 0 0 0 0 0.36 0 0 0 0 0.25 0 0 0 0.05 0'/></filter><rect width='140' height='140' filter='url(%23n)'/></svg>");
  }
  /* Same paper as body: position:fixed makes #wall a stacking context, so
     the plates' multiply blends against #wall's own backdrop — it must carry
     the paper itself or the blend sees only transparency (halo bug). */
  #wall { position: fixed; inset: 0; background: inherit; }
  .plate {
    position: absolute;
    left: 50%;
    top: 50%;
    opacity: 0;
    /* Blend the painting into the paper. On the figure itself — not the img —
       because the figure's transform creates a stacking context that would
       isolate a child's blend from the page. */
    mix-blend-mode: multiply;
    transition:
      opacity 2.2s ease,
      transform 1.6s cubic-bezier(0.22, 1, 0.36, 1),
      width 1.6s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .plate.shown { opacity: 1; }
  .plate.dying { opacity: 0; }
  .plate img {
    width: 100%;
    aspect-ratio: 4 / 5;
    object-fit: cover;
    display: block;
    /* Feather the painting's edges away into the paper — no hard rectangle.
       (The melt itself is the figure-level multiply above.) Birds are painted
       on plain white, so multiply drops the ground and leaves a cutout. */
    -webkit-mask-image: radial-gradient(ellipse 58% 58% at 50% 50%, black 72%, transparent 96%);
    mask-image: radial-gradient(ellipse 58% 58% at 50% 50%, black 72%, transparent 96%);
  }
  /* Title chrome — the only text on the wall. Birds carry no per-bird label. */
  #header {
    position: fixed;
    top: 4.5vmin;
    left: 0;
    right: 0;
    z-index: 1;
    text-align: center;
    color: var(--ink);
    pointer-events: none;
  }
  #header .eyebrow {
    font-style: italic;
    font-size: clamp(12px, 1.7vmin, 19px);
    color: var(--ink-dim);
    letter-spacing: 0.02em;
  }
  #header .title {
    font-size: clamp(22px, 4.2vmin, 52px);
    letter-spacing: 0.22em;
    font-variant: small-caps;
    margin-top: 0.4vmin;
  }
  #empty {
    position: fixed;
    inset: 0;
    z-index: 1; /* above #wall, which now paints an opaque paper background */
    display: grid;
    place-items: center;
    color: var(--ink-dim);
    font-style: italic;
    font-size: clamp(16px, 2.6vmin, 24px);
    letter-spacing: 0.12em;
    pointer-events: none;
    transition: opacity 1.8s ease;
  }
  #empty.hidden { opacity: 0; }
</style>
</head>
<body>
<div id="header">
  <div class="eyebrow">birds outside</div>
  <div class="title">heard recently</div>
</div>
<div id="empty">listening…</div>
<div id="wall"></div>
<script type="module">
import { computeCollage } from "/layout.js";

const wall = document.getElementById("wall");
const empty = document.getElementById("empty");
const plates = new Map(); // file -> element
const FADE_MS = 2300;

// Apply the pure layout (bird_painter/static/layout.js) to the plate elements.
// The maths — spiral placement, no-overlap, crowding scale — lives in that
// module so `node --test` can guard it (layout.test.js).
let liveOrder = []; // files, newest first — set by refresh()
function layoutAll() {
  const header = document.getElementById("header");
  const bandTop = header ? header.getBoundingClientRect().bottom + 8 : 0;
  const files = liveOrder.filter(f => plates.has(f));
  const placements = computeCollage(files, wall.clientWidth, wall.clientHeight, bandTop);
  for (const p of placements) {
    const el = plates.get(p.file);
    if (!el) continue;
    el.style.width = `${p.sizeVmin.toFixed(1)}vmin`;
    el.style.transform =
      `translate(-50%, -50%) translate(${p.x.toFixed(1)}px, ${p.y.toFixed(1)}px)`;
    el.querySelector("img").style.transform = `rotate(${p.tilt}deg)`;
    el.style.zIndex = String(p.z);
  }
}

// Re-layout when the viewport changes shape.
let resizeTimer;
window.addEventListener("resize", () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(layoutAll, 150);
});

function makePlate(p) {
  const fig = document.createElement("figure");
  fig.className = "plate";
  fig.dataset.file = p.file;
  // No visible label — a bare cutout. Species lives only in the img alt for
  // screen readers.
  const img = document.createElement("img");
  img.src = `/images/${encodeURIComponent(p.file)}`;
  img.alt = `Painting of ${p.species_common}`;
  fig.appendChild(img);
  requestAnimationFrame(() => requestAnimationFrame(() => fig.classList.add("shown")));
  return fig;
}

async function refresh() {
  let data;
  try {
    const res = await fetch("/api/live");
    if (!res.ok) return;
    data = await res.json();
  } catch { return; } // server briefly away; keep the current wall
  const liveFiles = new Set(data.paintings.map(p => p.file));

  for (const [file, el] of plates) {
    if (!liveFiles.has(file)) {
      plates.delete(file);
      el.classList.add("dying");
      setTimeout(() => el.remove(), FADE_MS);
    }
  }
  // Payload is newest-first; index 0 = newest = center of the collage.
  liveOrder = data.paintings.map(p => p.file);
  for (const p of data.paintings) {
    if (!plates.has(p.file)) {
      const el = makePlate(p);
      plates.set(p.file, el);
      wall.appendChild(el);
    }
  }
  layoutAll(); // existing plates glide to new collision-free spots
  empty.classList.toggle("hidden", plates.size > 0);
}

refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
