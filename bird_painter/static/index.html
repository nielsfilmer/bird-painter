<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>bird-painter</title>
<style>
  :root {
    --paper: #171512;
    --ink: #d8cfba;
    --ink-dim: #8d846f;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: Georgia, "Times New Roman", serif;
    min-height: 100vh;
    padding: 3vmin;
  }
  #wall {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 3vmin;
  }
  .plate {
    opacity: 0;
    transition: opacity 1.8s ease;
    text-align: center;
  }
  .plate.shown { opacity: 1; }
  .plate.dying { opacity: 0; }
  .plate img {
    width: 100%;
    aspect-ratio: 4 / 5;
    object-fit: cover;
    display: block;
    border: 1px solid #3a352c;
    box-shadow: 0 8px 28px rgba(0, 0, 0, 0.55);
    background: #f3ecd9;
  }
  .plate figcaption { margin-top: 1.1vmin; font-size: 15px; }
  .plate .species { letter-spacing: 0.04em; }
  .plate .heard { color: var(--ink-dim); font-size: 12.5px; margin-top: 2px; }
  #empty {
    position: fixed;
    inset: 0;
    display: grid;
    place-items: center;
    color: var(--ink-dim);
    font-style: italic;
    font-size: 20px;
    letter-spacing: 0.06em;
    pointer-events: none;
    transition: opacity 1.8s ease;
  }
  #empty.hidden { opacity: 0; }
</style>
</head>
<body>
<div id="empty">listening…</div>
<div id="wall"></div>
<script>
const wall = document.getElementById("wall");
const empty = document.getElementById("empty");
const plates = new Map(); // file -> element
const FADE_MS = 1900;

function heardText(bornAt) {
  const mins = Math.round((Date.now() / 1000 - bornAt) / 60);
  if (mins < 1) return "heard just now";
  if (mins < 60) return `heard ${mins} min ago`;
  const h = Math.floor(mins / 60);
  return `heard ${h}h ${mins % 60}m ago`;
}

function makePlate(p) {
  const fig = document.createElement("figure");
  fig.className = "plate";
  fig.dataset.bornAt = p.born_at;
  fig.innerHTML = `
    <img src="/images/${encodeURIComponent(p.file)}" alt="">
    <figcaption>
      <div class="species"></div>
      <div class="heard"></div>
    </figcaption>`;
  fig.querySelector("img").alt = `Painting of a ${p.species_common}`;
  fig.querySelector(".species").textContent = p.species_common;
  fig.querySelector(".heard").textContent = heardText(p.born_at);
  requestAnimationFrame(() => requestAnimationFrame(() => fig.classList.add("shown")));
  return fig;
}

async function refresh() {
  let data;
  try {
    const res = await fetch("/api/live");
    if (!res.ok) return;
    data = await res.json();
  } catch { return; } // server briefly away; keep the current wall
  const liveFiles = new Set(data.paintings.map(p => p.file));

  for (const [file, el] of plates) {
    if (!liveFiles.has(file)) {
      plates.delete(file);
      el.classList.add("dying");
      setTimeout(() => el.remove(), FADE_MS);
    }
  }
  for (const p of data.paintings) {
    if (!plates.has(p.file)) {
      const el = makePlate(p);
      plates.set(p.file, el);
      wall.prepend(el);
    } else {
      plates.get(p.file).querySelector(".heard").textContent = heardText(p.born_at);
    }
  }
  empty.classList.toggle("hidden", plates.size > 0);
}

refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
