<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>bird-painter</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  :root {
    --ink: #4a3f2e;
    --ink-dim: #8d8065;
  }
  html, body { height: 100%; }
  body {
    /* The paper the collage lives on — same aged-cream world as the
       paintings, with soft mottling so it reads as one sheet. */
    background:
      radial-gradient(ellipse at 22% 18%, rgba(122, 96, 59, 0.10), transparent 55%),
      radial-gradient(ellipse at 78% 76%, rgba(122, 96, 59, 0.12), transparent 50%),
      radial-gradient(ellipse at 65% 25%, rgba(255, 252, 240, 0.55), transparent 60%),
      radial-gradient(ellipse at 50% 50%, #f4edda 0%, #ece1c6 62%, #ddcda6 100%);
    color: var(--ink);
    font-family: Georgia, "Times New Roman", serif;
    overflow: hidden;
  }
  /* Grain overlay: subtle paper tooth over everything, plates included. */
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.5;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/><feColorMatrix values='0 0 0 0 0.42 0 0 0 0 0.36 0 0 0 0 0.25 0 0 0 0.05 0'/></filter><rect width='140' height='140' filter='url(%23n)'/></svg>");
  }
  /* Same paper as body: position:fixed makes #wall a stacking context, so
     the plates' multiply blends against #wall's own backdrop — it must carry
     the paper itself or the blend sees only transparency (halo bug). */
  #wall { position: fixed; inset: 0; background: inherit; }
  .plate {
    position: absolute;
    left: 50%;
    top: 50%;
    opacity: 0;
    /* Blend the whole plate (painting + ink labels) into the paper. On the
       figure itself — not the img — because the figure's transform creates a
       stacking context that would isolate a child's blend from the page. */
    mix-blend-mode: multiply;
    transition:
      opacity 2.2s ease,
      transform 1.6s cubic-bezier(0.22, 1, 0.36, 1),
      width 1.6s cubic-bezier(0.22, 1, 0.36, 1);
    text-align: center;
  }
  .plate.shown { opacity: 1; }
  .plate.dying { opacity: 0; }
  .plate img {
    width: 100%;
    aspect-ratio: 4 / 5;
    object-fit: cover;
    display: block;
    /* Feather the painting's edges away into the paper — no hard rectangle.
       (The melt itself is the figure-level multiply above.) */
    -webkit-mask-image: radial-gradient(ellipse 54% 54% at 50% 50%, black 64%, transparent 92%);
    mask-image: radial-gradient(ellipse 54% 54% at 50% 50%, black 64%, transparent 92%);
  }
  .plate figcaption {
    margin-top: -1.6vmin;
    font-size: clamp(11px, 1.6vmin, 16px);
  }
  .plate .species {
    letter-spacing: 0.09em;
    font-variant: small-caps;
  }
  .plate .heard {
    color: #6b5e45; /* darker than --ink-dim: small italic text needs the contrast */
    font-size: clamp(9px, 1.2vmin, 12.5px);
    font-style: italic;
    margin-top: 0.2vmin;
  }
  #empty {
    position: fixed;
    inset: 0;
    z-index: 1; /* above #wall, which now paints an opaque paper background */
    display: grid;
    place-items: center;
    color: var(--ink-dim);
    font-style: italic;
    font-size: clamp(16px, 2.6vmin, 24px);
    letter-spacing: 0.12em;
    pointer-events: none;
    transition: opacity 1.8s ease;
  }
  #empty.hidden { opacity: 0; }
</style>
</head>
<body>
<div id="empty">listening…</div>
<div id="wall"></div>
<script>
const wall = document.getElementById("wall");
const empty = document.getElementById("empty");
const plates = new Map(); // file -> element
const FADE_MS = 2300;
const GOLDEN_ANGLE = 2.399963229728653; // radians, 137.5°

function hash(str) {
  let h = 2166136261;
  for (let i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return h >>> 0;
}

function heardText(bornAt) {
  const mins = Math.round((Date.now() / 1000 - bornAt) / 60);
  if (mins < 1) return "heard just now";
  if (mins < 60) return `heard ${mins} min ago`;
  const h = Math.floor(mins / 60);
  return `heard ${h}h ${mins % 60}m ago`;
}

// Collage layout: phyllotaxis spiral from the center — newest bird in the
// middle, older ones drifting outward, sized/tilted stably per painting.
// Layout is computed for ALL plates together (layoutAll): each takes the
// first spiral spot where its box — image plus caption, plus a margin —
// overlaps nothing already placed, so birds never sit on each other and
// captions stay clear. Positions are pixels against the real viewport
// (aspect-aware) and clamped so no plate ever leaves the screen. Only the
// image tilts; captions stay horizontal.
const SIZE_MIN_VMIN = 24, SIZE_SPAN_VMIN = 12;   // plate width 24–35 vmin
const MAX_INDEX = 12;                            // matches the wall's live cap
const SPREAD_X = 0.42, SPREAD_Y = 0.38;          // ellipse: fraction of viewport
const PLATE_ASPECT = 5 / 4, CAPTION_ALLOWANCE = 1.26; // image 4:5 + caption room
                             // (1.26 covers a two-line caption — QA measured
                             // wrapped names up to ~14px past the old 1.18)
const TOP_Z = 200;
const GAP_VMIN = 2;          // breathing room between plate boxes
const SPIRAL_STEP = 0.22;    // how far along the spiral each retry walks
const MAX_TRIES = 220;       // spiral samples per plate before giving up
const FILL_FACTOR = 0.45;    // plates may claim at most this share of the
                             // viewport — beyond it, everything scales down
                             // together so a no-overlap fit stays possible
const SHRINK_RETRIES = 8;    // if any plate still couldn't find a free spot,
const SHRINK_STEP = 0.9;     // shrink everyone by this and lay out again

function overlapArea(a, b) {
  const w = Math.min(a.x + a.w / 2, b.x + b.w / 2)
          - Math.max(a.x - a.w / 2, b.x - b.w / 2);
  const h = Math.min(a.y + a.h / 2, b.y + b.h / 2)
          - Math.max(a.y - a.h / 2, b.y - b.h / 2);
  return Math.max(0, w) * Math.max(0, h);
}

// One layout pass at a given scale. Returns the chosen spots plus how many
// plates had to settle for an overlapping spot (fallbacks) — the caller
// shrinks and retries until that count is zero.
function computeLayout(scale, W, H, vmin) {
  const placed = [];
  let fallbacks = 0;
  liveOrder.forEach((file, index) => {
    if (!plates.has(file)) return;
    const h = hash(file);
    const sizeVmin = (SIZE_MIN_VMIN + (h % SIZE_SPAN_VMIN)) * scale;
    const sizePx = sizeVmin * vmin;
    const boxW = sizePx + GAP_VMIN * vmin;
    const boxH = sizePx * PLATE_ASPECT * CAPTION_ALLOWANCE + GAP_VMIN * vmin;
    const jitterA = (((h >>> 8) % 100) / 100 - 0.5) * 0.5; // ±0.25 rad
    const tilt = ((h >>> 16) % 15) - 7;                    // -7..+7 deg
    const clampX = Math.max(0, W / 2 - sizePx / 2);
    const clampY = Math.max(0, H / 2 - (boxH - GAP_VMIN * vmin) / 2);
    // Walk the spiral from this plate's natural spot until the box is free.
    let best = null, bestOverlap = Infinity;
    for (let t = index, tries = 0; tries < MAX_TRIES; tries++, t += SPIRAL_STEP) {
      const angle = t * GOLDEN_ANGLE + jitterA;
      const reach = Math.sqrt(t) / Math.sqrt(MAX_INDEX);
      let x = Math.cos(angle) * reach * SPREAD_X * W;
      let y = Math.sin(angle) * reach * SPREAD_Y * H;
      x = Math.max(-clampX, Math.min(clampX, x));
      y = Math.max(-clampY, Math.min(clampY, y));
      const box = { x, y, w: boxW, h: boxH };
      const overlap = placed.reduce(
        (sum, other) => sum + overlapArea(box, other.box), 0
      );
      if (overlap === 0) { best = box; bestOverlap = 0; break; }
      if (overlap < bestOverlap) { best = box; bestOverlap = overlap; }
    }
    if (bestOverlap > 0) fallbacks++;
    placed.push({ box: best, file, sizeVmin, tilt, index });
  });
  return { placed, fallbacks };
}

function layoutAll() {
  const W = wall.clientWidth, H = wall.clientHeight;
  const vmin = Math.min(W, H) / 100;
  // Crowding scale: if everyone's boxes together would claim more than
  // FILL_FACTOR of the screen, shrink all plates by the same factor.
  const naturalArea = liveOrder.reduce((sum, file) => {
    if (!plates.has(file)) return sum;
    const s = (SIZE_MIN_VMIN + (hash(file) % SIZE_SPAN_VMIN)) * vmin;
    return sum + (s + GAP_VMIN * vmin) * (s * PLATE_ASPECT * CAPTION_ALLOWANCE + GAP_VMIN * vmin);
  }, 0);
  let scale = Math.min(1, Math.sqrt((FILL_FACTOR * W * H) / (naturalArea || 1)));
  // A single spiral walk can fail even on a roomy screen (edge clamping
  // collapses far candidates into the same bands) — so shrink-and-relayout
  // until every plate found a genuinely free spot.
  let result = computeLayout(scale, W, H, vmin);
  for (let i = 0; i < SHRINK_RETRIES && result.fallbacks > 0; i++) {
    scale *= SHRINK_STEP;
    result = computeLayout(scale, W, H, vmin);
  }
  for (const { box, file, sizeVmin, tilt, index } of result.placed) {
    const el = plates.get(file);
    if (!el) continue;
    el.style.width = `${sizeVmin.toFixed(1)}vmin`;
    el.style.transform =
      `translate(-50%, -50%) translate(${box.x.toFixed(1)}px, ${box.y.toFixed(1)}px)`;
    el.querySelector("img").style.transform = `rotate(${tilt}deg)`;
    el.style.zIndex = String(TOP_Z - index);     // newer sits on top
  }
}

// Re-layout when the viewport changes shape.
let liveOrder = []; // files, newest first — set by refresh()
let resizeTimer;
window.addEventListener("resize", () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(layoutAll, 150);
});

function makePlate(p) {
  const fig = document.createElement("figure");
  fig.className = "plate";
  fig.dataset.file = p.file;
  fig.innerHTML = `
    <img src="/images/${encodeURIComponent(p.file)}" alt="">
    <figcaption>
      <div class="species"></div>
      <div class="heard"></div>
    </figcaption>`;
  fig.querySelector("img").alt = `Painting of ${p.species_common}`;
  fig.querySelector(".species").textContent = p.species_common;
  fig.querySelector(".heard").textContent = heardText(p.born_at);
  requestAnimationFrame(() => requestAnimationFrame(() => fig.classList.add("shown")));
  return fig;
}

async function refresh() {
  let data;
  try {
    const res = await fetch("/api/live");
    if (!res.ok) return;
    data = await res.json();
  } catch { return; } // server briefly away; keep the current wall
  const liveFiles = new Set(data.paintings.map(p => p.file));

  for (const [file, el] of plates) {
    if (!liveFiles.has(file)) {
      plates.delete(file);
      el.classList.add("dying");
      setTimeout(() => el.remove(), FADE_MS);
    }
  }
  // Payload is newest-first; index 0 = newest = center of the collage.
  liveOrder = data.paintings.map(p => p.file);
  for (const p of data.paintings) {
    let el = plates.get(p.file);
    if (!el) {
      el = makePlate(p);
      plates.set(p.file, el);
      wall.appendChild(el);
    } else {
      el.querySelector(".heard").textContent = heardText(p.born_at);
    }
  }
  layoutAll(); // existing plates glide to new collision-free spots
  empty.classList.toggle("hidden", plates.size > 0);
}

refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
